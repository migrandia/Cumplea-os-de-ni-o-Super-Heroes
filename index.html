<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>¡Misión Mateo! #5</title>
    <meta property="og:title" content="¡Alerta de Fiesta! Mateo cumple 5">
    <meta property="og:image" content="https://www.dropbox.com/scl/fi/jukw7sjtxdwowdyxxkrfq/H2.png?rlkey=c0p0anfy3ux1cxa9vzxvwydeq&raw=1">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --rojo-comic: #e62117;
            --azul-heroe: #164396;
            --amarillo-comic: #ffcc00;
            --texto-oscuro: #000000;
            --blanco: #ffffff;
            --ancho-max: 480px;
        }

        body {
            margin: 0; padding: 0;
            background-color: #1a1a1a;
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            overflow-x: hidden;
        }

        .wrapper {
            max-width: var(--ancho-max);
            margin: 0 auto;
            background-color: var(--azul-heroe);
            position: relative;
            background-image: url('https://www.transparenttextures.com/patterns/comic-books.png');
            border-left: 5px solid var(--texto-oscuro);
            border-right: 5px solid var(--texto-oscuro);
        }

        /* PORTADA AJUSTADA */
        .hero-cover {
            position: relative;
            padding: 0;
            background: white;
            overflow: visible; 
            border-bottom: 6px solid var(--texto-oscuro);
            height: 380px; /* Reduje la altura para que no sea tan masiva */
            clip-path: polygon(0 0, 100% 0, 100% 90%, 0 100%);
        }

        /* HÉROE CON TAMAÑO EQUILIBRADO */
        .img-heroe-3d {
            width: 100%; /* Ajustado de 130% a 100% */
            margin-left: 0;
            height: auto;
            display: block;
            position: absolute;
            bottom: -15px; /* Sobresale sutilmente */
            left: 50%;
            transform: translateX(-50%);
            z-index: 20; 
            animation: hero3DZoom 4s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.4));
        }

        @keyframes hero3DZoom {
            0%, 100% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.03); }
        }

        /* TÍTULOS VISIBLES */
        .name-container {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10; 
            width: 95%;
        }

        h1.comic-title {
            font-family: 'Bangers', cursive;
            font-size: 4.5rem; /* Reduje un poco el tamaño de la letra */
            color: var(--amarillo-comic);
            margin: 0;
            text-transform: uppercase;
            text-shadow: 3px 3px 0px var(--rojo-comic), 6px 6px 0px var(--texto-oscuro);
            animation: titleShaker 0.3s ease-in-out infinite alternate;
        }

        @keyframes titleShaker {
            0% { transform: rotate(-2deg); }
            100% { transform: rotate(1deg); }
        }

        /* SECCIONES Y CONTADOR */
        section { padding: 40px 20px; border-bottom: 3px solid var(--texto-oscuro); position: relative; }
        .card-panel { background: white; padding: 20px; border-radius: 8px; border: 3px solid var(--texto-oscuro); margin-bottom: 20px; }
        
        .timer-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .t-block { background: white; padding: 8px; border-radius: 5px; min-width: 55px; border: 2px solid var(--texto-oscuro); }
        .t-val { display: block; font-size: 1.8rem; color: var(--rojo-comic); font-family: 'Bangers'; }
        .t-lab { font-size: 0.6rem; font-weight: bold; }

        .btn-alerta {
            display: inline-block; margin-top: 20px; padding: 15px 30px;
            background-color: var(--rojo-comic); color: white; text-decoration: none;
            font-size: 1.2rem; font-family: 'Bangers'; letter-spacing: 2px;
            border-radius: 50px; width: 85%; border: 3px solid var(--texto-oscuro);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
    </style>
</head>
<body>

    <div class="wrapper">
        
        <div class="hero-cover">
            <div class="name-container">
                <h1 class="comic-title">Mateo</h1>
                <p style="font-family: 'Bangers'; font-size: 1.5rem; color: var(--rojo-comic); margin: 0;">¡Misión Nivel 5!</p>
            </div>
            
            <img src="https://www.dropbox.com/scl/fi/jukw7sjtxdwowdyxxkrfq/H2.png?rlkey=c0p0anfy3ux1cxa9vzxvwydeq&raw=1" class="img-heroe-3d" alt="Mateo">
        </div>

        <section style="background-color: var(--azul-heroe);">
            <h2 style="font-family: 'Bangers'; font-size: 2.2rem; color: white; text-shadow: 2px 2px 0 var(--texto-oscuro);">¡RECLUTANDO HÉROES!</h2>
            <p style="color: white; font-weight: bold; line-height: 1.5;">
                Únete a la liga de Mateo para una tarde llena de acción, juegos y mucho poder. ¡No faltes!
            </p>
        </section>

        <section style="background-color: white;">
            <p style="font-family: 'Bangers'; font-size: 1.2rem; color: var(--rojo-comic);">COORDENADAS:</p>
            <p><strong>Salón "Súper Diversión"</strong><br>14 de Marzo | 16:00 HRS</p>
            
            <div class="timer-container">
                <div class="t-block"><span class="t-val" id="d">00</span><span class="t-lab">DÍAS</span></div>
                <div class="t-block"><span class="t-val" id="h">00</span><span class="t-lab">HRS</span></div>
                <div class="t-block"><span class="t-val" id="m">00</span><span class="t-lab">MIN</span></div>
                <div class="t-block"><span class="t-val" id="s">00</span><span class="t-lab">SEG</span></div>
            </div>
        </section>

        <section style="background-color: white; border: none; padding-bottom: 60px;">
            <a href="https://wa.me/521234567890?text=¡Misión aceptada!" class="btn-alerta">CONFIRMAR ASISTENCIA</a>
        </section>

    </div>

    <script>
        function timer() {
            const dest = new Date("March 14, 2027 16:00:00").getTime();
            const now = new Date().getTime();
            const diff = dest - now;
            if (diff > 0) {
                document.getElementById('d').innerText = String(Math.floor(diff / (1000*60*60*24))).padStart(2, '0');
                document.getElementById('h').innerText = String(Math.floor((diff % (1000*60*60*24)) / (1000*60*60))).padStart(2, '0');
                document.getElementById('m').innerText = String(Math.floor((diff % (1000*60*60)) / (1000*60))).padStart(2, '0');
                document.getElementById('s').innerText = String(Math.floor((diff % (1000*60)) / 1000)).padStart(2, '0');
            }
        }
        timer(); setInterval(timer, 1000);
    </script>
</body>
</html>
